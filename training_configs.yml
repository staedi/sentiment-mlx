adapter_path: adapters
batch_size: 2
data: data
fine_tune_type: lora
grad_checkpoint: true
iters: 500
learning_rate: 1.0e-05
lora_parameters:
  dropout: 0.05
  keys:
  - self_attn.q_proj
  - self_attn.v_proj
  - self_attn.k_proj
  - self_attn.o_proj
  rank: 8
  scale: 20.0
max_seq_length: 512
model: mlx-community/Llama-3.2-3B-Instruct-4bit
num_layers: 16
save_every: 100
seed: 42
steps_per_eval: 100
steps_per_report: 10
test: false
test_batches: 100
train: true
val_batches: 25
